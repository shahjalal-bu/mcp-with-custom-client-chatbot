<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ConnectAuz Product Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo">CA</div>
        <div>
          <h1>ConnectAuz Assistant</h1>
          <p class="subtitle" id="subtitle">Ask about CA Fleet, CA Workforce, CA POS, CA Project…</p>
        </div>
      </div>
      <button class="reset" id="reset">New chat</button>
    </header>

    <main class="chat" id="chat"></main>

    <form class="composer" id="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="Ask anything about ConnectAuz products… (Shift+Enter for newline)"
        autofocus
      ></textarea>
      <button type="submit" id="send">Send</button>
    </form>

    <script>
      window.BACKEND_URL = "http://localhost:3000";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
